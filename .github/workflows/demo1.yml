name: deploy website
on:
  push:
    branch:
      - master      
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      script-line: ${{steps.publish.outputs.script-line}} 
    steps:
      - name: Get a code
        uses: actions/checkout@v3
      - name: install dependencies
        run: npm ci     
        run: npm run build
      - name: publish JS filename
        id: publish
        run: find dist/assets/*.js -type f -execdir echo 'script-line={}' >> ${GITHUB_output} ';'
      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist
          # dist
          # package.json
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
      - name: list content
        run: ls
      - name: Deploy project
        run: echo "Deploying..."